services:
  # --- PostgreSQL Setup ---
  db:
    image: postgres:15-alpine
    container_name: boilerplate_postgres
    restart: always
    environment:
      POSTGRES_USER: boilerplate
      POSTGRES_PASSWORD: pass_boilerplate
      POSTGRES_DB: boilerplate_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_boilerplate:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: boilerplate@dev.com
      PGADMIN_DEFAULT_PASSWORD: pass_boilerplate
    ports:
      - "5050:80" 
    depends_on:
      - db

  # --- MongoDB Setup ---
  mongodb:
    image: mongo:latest
    container_name: boilerplate_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: boilerplate
      MONGO_INITDB_ROOT_PASSWORD: pass_boilerplate
    ports:
      - "27017:27017"
    volumes:
      - mongodata_boilerplate:/data/db

  mongo_ui:
    image: mongo-express:latest
    container_name: mongo_express_ui
    restart: always
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: boilerplate
      ME_CONFIG_MONGODB_ADMINPASSWORD: pass_boilerplate
      ME_CONFIG_MONGODB_URL: mongodb://boilerplate:pass_boilerplate@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: boilerplate
      ME_CONFIG_BASICAUTH_PASSWORD: pass_boilerplate
    ports:
      - "8081:8081"
    depends_on:
      - mongodb

volumes:
  pgdata_boilerplate:
  mongodata_boilerplate: